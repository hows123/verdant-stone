<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 215" width="680" height="215" role="img">
  <title>Verdant Stone</title>
  <desc>Verdant Stone landscape construction company logo</desc>

  <!-- Fondo transparente (sin rect de fondo) -->

  <!-- V mark — deep forest green #1F3525 -->
  <line x1="60" y1="25" x2="107" y2="122" stroke="#1F3525" stroke-width="7" stroke-linecap="round"/>
  <line x1="154" y1="25" x2="107" y2="122" stroke="#1F3525" stroke-width="7" stroke-linecap="round"/>

  <!-- Stone strata — warm stone #9C8570, decreasing width -->
  <line x1="44" y1="143" x2="170" y2="143" stroke="#9C8570" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="60" y1="158" x2="154" y2="158" stroke="#9C8570" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="76" y1="171" x2="138" y2="171" stroke="#9C8570" stroke-width="2"   stroke-linecap="round"/>

  <!-- Vertical divider -->
  <line x1="200" y1="22" x2="200" y2="188" stroke="#C8BAA8" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="224" y="108"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="52"
    font-weight="400"
    fill="#1A1A1A"
    letter-spacing="7">VERDANT</text>

  <text x="224" y="166"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="52"
    font-weight="400"
    fill="#9C8570"
    letter-spacing="20">STONE</text>

  <!-- Tagline -->
  <text x="226" y="187"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11"
    font-weight="400"
    fill="#9C8570"
    letter-spacing="4.5"
    opacity="0.85">LANDSCAPE CONSTRUCTION</text>
</svg>
