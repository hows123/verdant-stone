[[headers]]
  for = "/*"
  [headers.values]
    # Evita que tu sitio sea embebido en iframes de otros sitios (clickjacking)
    X-Frame-Options = "DENY"

    # Evita que el navegador adivine el tipo de archivo — previene ataques de MIME sniffing
    X-Content-Type-Options = "nosniff"

    # Controla qué información se comparte al hacer clic en links externos
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Desactiva funciones del navegador que no necesitas (cámara, micrófono, geolocalización)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Solo permite cargar recursos desde tu propio dominio — bloquea scripts externos maliciosos
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; form-action 'self' https://verdantstonelc.com; frame-ancestors 'none';"
