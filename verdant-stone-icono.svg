<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" role="img">
  <title>Verdant Stone — Ícono</title>
  <desc>Verdant Stone icon mark — geometric V with stone strata</desc>

  <!-- V mark -->
  <line x1="20" y1="20" x2="80" y2="100" stroke="#1F3525" stroke-width="10" stroke-linecap="round"/>
  <line x1="140" y1="20" x2="80" y2="100" stroke="#1F3525" stroke-width="10" stroke-linecap="round"/>

  <!-- Stone strata -->
  <line x1="10"  y1="120" x2="150" y2="120" stroke="#9C8570" stroke-width="5"   stroke-linecap="round"/>
  <line x1="28"  y1="136" x2="132" y2="136" stroke="#9C8570" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="46"  y1="150" x2="114" y2="150" stroke="#9C8570" stroke-width="2.5" stroke-linecap="round"/>
</svg>
